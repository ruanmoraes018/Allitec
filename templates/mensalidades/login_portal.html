<!DOCTYPE html>
{% load static %}
<html lang="pt-br">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Portal do Cliente</title>
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://kit.fontawesome.com/fdc1a494f5.js" crossorigin="anonymous"></script>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
        <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
        <style>
            .login-box{max-width:380px; margin:auto; margin-top:90px;}
            .toastify{font-size:14px; padding:14px 18px; border-radius:10px; font-weight:500;}
        </style>
    </head>
    <body class="bg-dark-subtle">
        <div class="login-box">
            <div class="card shadow">
                <div class="card-header text-center bg-dark text-white"><h5 class="mb-0">Área do Cliente</h5></div>
                <div class="card-body">
                    <div class="mx-auto text-center">
                        <img src="{% static 'img/Allitec logo_az.png' %}" style="width: 12rem; text-align: center;">
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label>CPF/CNPJ*</label>
                            <input type="text" name="cnpj" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Chave de Login*</label>
                            <input type="password" name="senha" class="form-control" required>
                        </div>
                        <button class="btn btn-dark w-100">Entrar</button>
                    </form>
                    <div class="mx-auto text-center"><small>Se você esqueceu a chave, entre em contato com o suporte.</small></div>
                </div>
            </div>
        </div>
    </body>
    {% if erro %}
        <script>
            document.addEventListener("DOMContentLoaded", function(){
                toast("<i class='fa-solid fa-circle-exclamation'></i> {{ erro|escapejs }}", cor_vermelho);
                const senha = document.querySelector('input[name="senha"]');
                if(senha){
                    senha.value = "";
                    senha.focus();
                }
            });
        </script>
    {% endif %}
    <script>
        let cor_verde = "linear-gradient(to right, #00b09b, #96c93d)";
        let cor_vermelho = "linear-gradient(to right, #ff416c, #ff4b2b)";
        let cor_amarelo = "linear-gradient(to right, #ff9f00, #ff6f00)";
        function toast(msg, cor="#333") {
            Toastify({
                text: msg,
                duration: 3000,
                gravity: "top",
                position: "center",
                backgroundColor: cor,
                stopOnFocus: true,
                escapeMarkup: false,
            }).showToast();
        }
    </script>
</html>
